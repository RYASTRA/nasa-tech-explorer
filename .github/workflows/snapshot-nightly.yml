name: snapshot-nightly
on:
  schedule:
    - cron: "17 5 * * *" # 05:17 UTC nightly; off the top of the hour on purpose
  workflow_dispatch:
permissions:
  contents: write
  pages: write
  id-token: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - run: pip install -e .
      - name: Snapshot + build
        run: python -m t2_explorer all
      - name: Commit changes
        run: |
          TODAY="$(date -u +%F)"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data site
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "chore: nightly T2 snapshot ${TODAY}"
            git push
          fi
  deploy:
    needs: build
    uses: ./.github/workflows/deploy.yml
